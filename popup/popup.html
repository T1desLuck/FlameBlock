<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FlameBlock</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">

    <header class="head">
      <div class="brand">
        <img src="../icons/icon32.png" alt="" class="logo">
        <span class="brand-name">FlameBlock</span>
      </div>
      <button id="pauseBtn" class="icon-btn" data-i18n-title="pause_all_title" data-i18n-aria-label="pause_all_title" title="Приостановить везде" aria-label="Приостановить везде">
        <svg viewBox="0 0 24 24" width="18" height="18"><path id="pauseIcon" fill="currentColor" d="M8 5h3v14H8zM13 5h3v14h-3z"/></svg>
      </button>
    </header>

    <section class="site-card neu-out">
      <div class="site-row">
        <div class="site-info">
          <span class="site-label" data-i18n="this_site">Этот сайт</span>
          <span id="hostname" class="hostname">—</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="siteToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div id="siteStatus" class="site-status" data-i18n="protection_on">Защита включена</div>
    </section>

    <section class="stats-row">
      <div class="stat-card neu-out">
        <span id="pageCount" class="stat-num">0</span>
        <span class="stat-label" data-i18n="on_page">на странице</span>
      </div>
      <div class="stat-card neu-out">
        <span id="totalCount" class="stat-num">0</span>
        <span class="stat-label" data-i18n="total_blocked_label">всего заблокировано</span>
      </div>
    </section>

    <button id="reloadBtn" class="text-btn" data-i18n="reload_page">Обновить страницу</button>

    <footer class="foot">
      <button id="settingsBtn" class="settings-btn neu-out">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.3 7.3 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L1.63 8.84a.5.5 0 0 0 .12.64L3.78 11.06c-.05.3-.08.62-.08.94s.02.64.07.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.32.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.24.1.48 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/></svg>
        <span data-i18n="extension_settings">Настройки расширения</span>
      </button>
    </footer>
  </div>

  <script src="../common.js"></script>
  <script src="../i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
